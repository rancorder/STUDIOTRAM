<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>STUDIO TRAM ｜ 手元（presenter）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="pv">
    <div class="pv-stagewrap">
      <div class="stage" id="stage">
        <div class="slide-mount" id="mount"></div>
        <div class="track" aria-hidden="true">
          <div class="track-line"></div>
          <div class="track-fill"></div>
          <div class="track-node"></div>
        </div>
      </div>
    </div>

    <div class="pv-side">
      <div class="pv-counter">
        <span class="num" id="pvNum">01 / 10</span>
        <span class="lay" id="pvLay"></span>
      </div>
      <div>
        <div class="pv-notes-label">SPEAKER NOTES（手元のみ）</div>
        <div class="pv-notes" id="pvNotes"></div>
      </div>
      <div>
        <div class="pv-next-label">NEXT</div>
        <div class="pv-next" id="pvNext"></div>
      </div>
    </div>

    <div class="pv-bar">
      <button class="pv-btn" id="btnPrev">◀ 前へ</button>
      <button class="pv-btn primary" id="btnNext">次へ ▶</button>
      <button class="pv-btn" id="btnOpen">観客ウィンドウを開く</button>
      <button class="pv-btn" id="btnTimer">タイマー開始</button>
      <button class="pv-btn" id="btnReset">リセット</button>
      <span class="pv-hint">← / → / Space で送り</span>
      <span class="pv-timer" id="pvTimer">00:00</span>
    </div>
  </div>

  <script src="deck-data.js"></script>
  <script>
  (function () {
    const DECK = window.TRAM_DECK, TOTAL = DECK.length;
    const stage = document.getElementById("stage");
    const mount = document.getElementById("mount");
    const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
    let cur = 0;

    const $ = (id) => document.getElementById(id);

    let ch = null;
    try { ch = new BroadcastChannel("studio-tram-deck"); } catch (e) {}
    if (ch) ch.onmessage = (e) => {
      const m = e.data || {};
      if (m.type === "goto" && m.i !== cur) go(m.i, false);
      if (m.type === "state" && m.i !== cur) go(m.i, false);
    };
    function broadcast(o) { if (ch) ch.postMessage(o); }

    function pad(n){ return String(n).padStart(2,"0"); }

    function fitStage() {
      const wrap = stage.parentElement;
      const s = Math.min((wrap.clientWidth - 56) / 1280, (wrap.clientHeight - 56) / 720);
      stage.style.transform = "translate(-50%,-50%) scale(" + Math.max(0.1, s) + ")";
    }
    addEventListener("resize", fitStage);

    function renderPreview() {
      mount.innerHTML = window.renderSlide(DECK[cur], cur, TOTAL);
      stage.style.setProperty("--progress", TOTAL > 1 ? cur / (TOTAL - 1) : 0);
      stage.classList.toggle("is-hero", DECK[cur].layout === "hero");
      const el = mount.querySelector(".slide");
      el.classList.add("in"); // 手元は即表示
    }

    function renderSide() {
      $("pvNum").textContent = pad(cur + 1) + " / " + pad(TOTAL);
      $("pvLay").textContent = DECK[cur].layout.toUpperCase();
      $("pvNotes").textContent = DECK[cur].note || "—";
      if (cur < TOTAL - 1) {
        const n = DECK[cur + 1];
        const title = n.title || n.lead || n.figure || (n.parts && n.parts.join(" × ")) ||
                      (n.eyebrow) || "";
        $("pvNext").innerHTML = '<div class="nx-title">' + pad(cur + 2) + '　' +
          escapeHtml(n.eyebrow) + (title && title !== n.eyebrow ? '：' + escapeHtml(title) : '') +
          '</div>';
      } else {
        $("pvNext").innerHTML = '<div class="nx-end">— 最後のスライド（日程打診）—</div>';
      }
    }
    function escapeHtml(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

    function go(i, emit) {
      i = Math.max(0, Math.min(TOTAL - 1, i));
      cur = i;
      renderPreview(); renderSide();
      if (emit) broadcast({ type: "goto", i: cur });
    }
    function next(){ go(cur + 1, true); }
    function prev(){ go(cur - 1, true); }

    $("btnNext").onclick = next;
    $("btnPrev").onclick = prev;
    $("btnOpen").onclick = () => {
      const w = window.open("index.html", "tram_audience");
      setTimeout(() => broadcast({ type: "goto", i: cur }), 400);
    };

    /* タイマー */
    let t0 = null, raf = null, paused = 0, running = false;
    function tick() {
      const ms = Date.now() - t0 + paused;
      const s = Math.floor(ms / 1000);
      $("pvTimer").textContent = pad(Math.floor(s / 60)) + ":" + pad(s % 60);
      raf = requestAnimationFrame(tick);
    }
    $("btnTimer").onclick = () => {
      if (!running) { t0 = Date.now(); running = true; $("btnTimer").textContent = "一時停止"; tick(); }
      else { paused += Date.now() - t0; running = false; cancelAnimationFrame(raf); $("btnTimer").textContent = "再開"; }
    };
    $("btnReset").onclick = () => {
      running = false; cancelAnimationFrame(raf); paused = 0; t0 = null;
      $("pvTimer").textContent = "00:00"; $("btnTimer").textContent = "タイマー開始";
    };

    addEventListener("keydown", (e) => {
      if (["ArrowRight","PageDown"," "].includes(e.key)) { e.preventDefault(); next(); }
      else if (["ArrowLeft","PageUp"].includes(e.key)) { e.preventDefault(); prev(); }
      else if (e.key === "Home") go(0, true);
      else if (e.key === "End") go(TOTAL - 1, true);
    });

    fitStage(); go(0, false);
    broadcast({ type: "hello" });
  })();
  </script>
</body>
</html>
